name: backend-ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r backend/requirements/test.txt
      - run: cd backend && python -c "from app.factory import create_app; print(create_app().name)"
      - run: cd backend && if [ -d tests ]; then pytest; else echo "No tests"; fi
