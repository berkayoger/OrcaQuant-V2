version: "3.9"
services:
  backend:
    build: ../../backend
    command: flask --app app.factory run --host=0.0.0.0 --port=5000
    env_file:
      - ../../.env.example
    volumes:
      - ../../backend:/app
    ports:
      - "5000:5000"
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ../../frontend:/app
    ports:
      - "5173:5173"
